<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Now | Revive IV Hydration</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar" style="display: flex; justify-content: center; align-items: center; gap: 15px;">
        <span style="font-size: 0.9rem;">Expert IV Hydration Delivered to You</span>
        <a href="book.html" style="background-color: white; color: var(--accent); padding: 4px 15px; border-radius: 20px; font-weight: 700; font-size: 0.75rem;">BOOK NOW</a>
    </div>

    <!-- Header / Navbar -->
    <header class="navbar">
        <div class="logo">
            <a href="index.html"><img src="https://res.cloudinary.com/dpcidympa/image/upload/q_auto/f_auto/v1775173998/Screenshot_2026-04-03_051123-removebg-preview_wa0knu.png" alt="Revive IV Logo" class="logo-img"></a>
        </div>
        <div class="hamburger">
            <i class="fa-solid fa-bars"></i>
        </div>
        <nav class="nav-links">
            <a href="index.html">HOME</a>
            <a href="iv-drips.html">IV DRIPS</a>
            <a href="iv-drips.html">DRIP SUCCESS FORMULA</a>
            <a href="about.html">ABOUT</a>
            <a href="faqs.html">FAQS</a>
            <a href="index.html#reviews">REVIEWS</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </header>

    <div class="container section-padding text-center">
        <h1 class="product-title" style="margin-top: 40px;">Book Your Drip</h1>
        <p class="section-desc">Select your date, time, and service. Our mobile nurses will come to you.</p>
        
        <div class="product-card-single mt-4" style="max-width: 600px;">
            <form style="display: flex; flex-direction: column; gap: 20px;">
                <input type="text" placeholder="Full Name" style="width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; font-family: 'Inter', sans-serif;">
                <input type="email" placeholder="Email Address" style="width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; font-family: 'Inter', sans-serif;">
                <input type="tel" placeholder="Phone Number" style="width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; font-family: 'Inter', sans-serif;">
                <select style="width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; font-family: 'Inter', sans-serif; background: white;">
                    <option>Select Service</option>
                    <option>All-Inclusive IV - $399</option>
                    <option>Revive Calm IV - $279</option>
                    <option>Brain Focus IV - $400</option>
                    <option>NAD+ Injection - $250</option>
                </select>
                <input type="date" style="width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; font-family: 'Inter', sans-serif; color: #666;">
                
                <button type="button" class="btn-dark" style="font-size: 1.1rem; padding: 18px; margin-top: 10px;" onclick="alert('Thank you for booking! We will contact you shortly.')">REQUEST APPOINTMENT</button>
            </form>
        </div>
    </div>
    
    <footer class="footer">
        <div class="footer-logo">
            <i class="fa-solid fa-droplet"></i>
            <span>REVIVE IV HYDRATION</span>
        </div>
        <p class="copyright">Copyright Â© 2024 Revive IV Hydration | All Rights Reserved.</p>
    </footer>
    <script>
        // Hamburger Menu Toggle
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');
        
        if (hamburger) {
            hamburger.addEventListener('click', () => {
                navLinks.classList.toggle('active');
                const icon = hamburger.querySelector('i');
                if(navLinks.classList.contains('active')) {
                    icon.classList.remove('fa-bars');
                    icon.classList.add('fa-xmark');
                } else {
                    icon.classList.remove('fa-xmark');
                    icon.classList.add('fa-bars');
                }
            });
        }
    </script>
</body>
</html>
